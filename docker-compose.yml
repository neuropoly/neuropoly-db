# =============================================================================
# Development Stack: Elasticsearch 9.3 + Kibana 9.3 + Redis 7
# =============================================================================
#
# Services:
#   - Elasticsearch (port 9200): Search engine and vector database
#   - Kibana (port 5601): Elasticsearch management UI
#   - Redis (port 6379): Celery message broker and result backend
#   - Ollama: Local LLM server (optional)
#
# BEFORE STARTING: Set vm.max_map_count on the Docker host:
#   sudo sysctl -w vm.max_map_count=262144
# To persist across reboots, add to /etc/sysctl.conf:
#   vm.max_map_count=262144
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Reset:   docker compose down -v   (destroys indexed data)
# Logs:    docker compose logs -f elasticsearch
# =============================================================================

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    container_name: neuropoly-es-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Local dev only — NEVER in production
      - xpack.ml.enabled=true # Required for ELSER sparse embeddings
      - ES_JAVA_OPTS=-Xms1g -Xmx1g # Adjust based on available RAM
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - neuropoly-es

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.0
    container_name: neuropoly-es-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - neuropoly-es

  redis:
    image: redis:7-alpine
    container_name: neuropoly-es-redis
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - neuropoly-es

  ollama:
    image: ollama/ollama:latest
    container_name: neuropoly-es-ollama
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - neuropoly-es

networks:
  neuropoly-es:
    driver: bridge

volumes:
  es-data:
    driver: local
  redis-data:
    driver: local
  ollama-data:
    driver: local
