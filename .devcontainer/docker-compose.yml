# =============================================================================
# Dev Container — NeuroPoly DB
#
# Used as the SECOND compose file alongside ../docker-compose.yml.
# All Neurobagel services (graph, api, federation, proxy) come from root.
# This file only adds the Python dev workspace container.
#
# Paths are relative to the PROJECT DIRECTORY (repo root), because
# devcontainer.json lists ../docker-compose.yml first.
# =============================================================================

services:
  workspace:
    image: mcr.microsoft.com/devcontainers/python:3.12-bookworm
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      # "." = repo root (project directory set by first compose file)
      - .:/workspaces/neuropoly-db:cached
      # Shadow host .venv with a container-local named volume
      - venv-data:/workspaces/neuropoly-db/.venv
    command: sleep infinity
    depends_on:
      - proxy

volumes:
  venv-data:
