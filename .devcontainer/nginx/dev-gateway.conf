server {
    listen 80;
    server_name _;

    # Frontend app
    location / {
        proxy_pass http://query_federation:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Federation API exposed to browser clients under same origin
    location = /fapi {
        return 301 /fapi/;
    }
    location /fapi/ {
        proxy_pass http://federation:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Node API exposed to browser clients under same origin
    location = /napi {
        return 301 /napi/;
    }
    location /napi/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
