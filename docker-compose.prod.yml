# =============================================================================
# Production Stack: Elasticsearch 9.3 + Kibana 9.3 + Redis 7
# =============================================================================
#
# This is the PRODUCTION configuration with security enabled.
# DO NOT use in development (use docker-compose.yml instead).
#
# Key differences from dev setup:
#   - xpack.security.enabled=true (API keys, TLS)
#   - Increased heap size (4-8GB)
#   - Volume persistence with proper permissions
#   - Health checks and restart policies
#   - Resource limits
#   - Replica shards enabled
#
# PREREQUISITES:
#   1. Set vm.max_map_count:
#      sudo sysctl -w vm.max_map_count=262144
#   
#   2. Create .env file with credentials:
#      ELASTIC_PASSWORD=<strong-password>
#      KIBANA_PASSWORD=<strong-password>
#
#   3. Generate SSL certificates (optional, for TLS):
#      docker-compose -f docker-compose.prod.yml run --rm elasticsearch \
#        bin/elasticsearch-certutil ca --pem --out /usr/share/elasticsearch/config/certs/ca.zip
#
# DEPLOYMENT:
#   docker-compose -f docker-compose.prod.yml up -d
#
# INITIAL SETUP:
#   1. Get bootstrap password:
#      docker-compose -f docker-compose.prod.yml logs elasticsearch | grep "Password"
#   
#   2. Create API key for application:
#      curl -X POST "http://localhost:9200/_security/api_key" \
#        -u elastic:<bootstrap-password> \
#        -H "Content-Type: application/json" \
#        -d '{"name":"neuropoly-db","role_descriptors":{"neuropoly":{"cluster":["all"],"index":[{"names":["neuroimaging*"],"privileges":["all"]}]}}}'
#
# =============================================================================

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    container_name: neuropoly-prod-elasticsearch
    environment:
      # Cluster settings
      - node.name=es-node-1
      - cluster.name=neuropoly-prod
      - discovery.type=single-node
      
      # Security (ENABLED)
      - xpack.security.enabled=true
      - xpack.security.authc.api_key.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      
      # ML for ELSER (optional)
      - xpack.ml.enabled=true
      
      # Memory
      - ES_JAVA_OPTS=-Xms4g -Xmx4g  # 4GB heap (adjust based on RAM)
      - bootstrap.memory_lock=true
      
    ports:
      - "9200:9200"
      - "9300:9300"
    
    volumes:
      - es-prod-data:/usr/share/elasticsearch/data
      - es-prod-logs:/usr/share/elasticsearch/logs
      - es-prod-config:/usr/share/elasticsearch/config
    
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsSL -u elastic:${ELASTIC_PASSWORD:-changeme} http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    
    restart: unless-stopped
    
    networks:
      - neuropoly-prod
    
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.0
    container_name: neuropoly-prod-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-changeme}
      - SERVER_NAME=neuropoly-kibana
      - KIBANA_DEFAULTAPPID=discover
    
    ports:
      - "5601:5601"
    
    volumes:
      - kibana-prod-data:/usr/share/kibana/data
    
    depends_on:
      elasticsearch:
        condition: service_healthy
    
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsSL http://localhost:5601/api/status || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    
    restart: unless-stopped
    
    networks:
      - neuropoly-prod
    
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: neuropoly-prod-redis
    command: redis-server --appendonly yes --appendfsync everysec --requirepass ${REDIS_PASSWORD:-changeme}
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis-prod-data:/data
    
    healthcheck:
      test: [ "CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-changeme}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    
    restart: unless-stopped
    
    networks:
      - neuropoly-prod
    
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

networks:
  neuropoly-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  es-prod-data:
    driver: local
  es-prod-logs:
    driver: local
  es-prod-config:
    driver: local
  kibana-prod-data:
    driver: local
  redis-prod-data:
    driver: local
